name: Spain Fuel Prices Pipeline

on:
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: self-hosted

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_JOB_ID: ${{ secrets.DATABRICKS_JOB_ID }}
      DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
          python3 --version

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install -r requirements.txt

      - name: Verify Databricks CLI
        run: |
          databricks version

      - name: Download Fuel Prices
        run: |
          python3 scripts/download_fuel_prices.py

      - name: Upload JSON to Databricks Volume
        run: |
          LATEST_FILE=$(ls -t data/raw/*.json | head -n 1)

          echo "Uploading: $LATEST_FILE"

          databricks fs cp \
            "$LATEST_FILE" \
            "dbfs:/Volumes/workspace/default/fuel_prices/raw/$(basename "$LATEST_FILE")" \
            --overwrite

      - name: Trigger Databricks Job
        run: |
          RESPONSE=$(curl -s -X POST \
            "$DATABRICKS_HOST/api/2.1/jobs/run-now" \
            -H "Authorization: Bearer $DATABRICKS_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"job_id\": $DATABRICKS_JOB_ID}")

          echo "$RESPONSE"

          RUN_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['run_id'])")

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Wait for Databricks Job
        run: |
          echo "Waiting for Databricks Job..."

          while true
          do
            STATUS=$(curl -s \
              "$DATABRICKS_HOST/api/2.1/jobs/runs/get?run_id=$RUN_ID" \
              -H "Authorization: Bearer $DATABRICKS_TOKEN")

            LIFE=$(echo "$STATUS" | python3 -c "import sys,json; print(json.load(sys.stdin)['state']['life_cycle_state'])")

            RESULT=$(echo "$STATUS" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['state'].get('result_state',''))")

            echo "Status: $LIFE - $RESULT"

            if [ "$LIFE" = "TERMINATED" ]; then
              if [ "$RESULT" != "SUCCESS" ]; then
                echo "Databricks Job failed."
                exit 1
              fi
              echo "Databricks Job completed successfully."
              break
            fi

            if [ "$LIFE" = "INTERNAL_ERROR" ] || [ "$LIFE" = "SKIPPED" ]; then
              echo "Databricks Job ended unexpectedly."
              exit 1
            fi

            sleep 2
          done

      - name: Generate Execution Summary
        env:
          RUN_ID: ${{ env.RUN_ID }}
        run: |
          python3 .github/scripts/generate_summary.py
